name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Optional git ref to build
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: "3.14"
  UV_CACHE_DIR: .uv-cache

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install release environment
        run: uv sync --frozen --extra dev --group dev

      - name: Configure optional ROM tests
        shell: bash
        run: |
          set -euo pipefail
          uv run python - <<'PY' >> "$GITHUB_ENV"
          from pathlib import Path

          from supermariobrosnes_turbo.roms import EXPECTED_SMB_ROM_SHA256, sha256_path

          try:
              import stable_retro
          except ModuleNotFoundError:
              rom_path = None
              data_path = None
          else:
              data_path = Path(stable_retro.__file__).resolve().parent / "data"
              rom_path = (
                  data_path
                  / "stable"
                  / "SuperMarioBros-Nes-v0"
                  / "rom.nes"
              )
          if rom_path is not None and rom_path.exists():
              digest = sha256_path(rom_path)
              if digest != EXPECTED_SMB_ROM_SHA256:
                  raise SystemExit(f"unexpected release ROM SHA-256: {digest}")
              print(f"RETRO_DATA_PATH={data_path}")
          else:
              print("ALLOW_MISSING_ROM_TESTS=1")
          PY

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION.txt)"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$version" ]]; then
              echo "Tag $GITHUB_REF_NAME does not match project version $version" >&2
              exit 1
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check version consistency
        run: uv run python .codex/skills/build-release/scripts/release_build.py check-version --version "${{ steps.version.outputs.version }}"

      - name: Check PyPI version is unused
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: uv run python .codex/skills/build-release/scripts/release_build.py check-pypi --version "${{ steps.version.outputs.version }}"

      - name: Run source checks
        run: |
          cargo fmt --check --all
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo check --workspace --release
          uv run python scripts/check_smb_dependency_closure.py
          uv run maturin develop --release
          make test PYTHON=.venv/bin/python

  build:
    name: Build ${{ matrix.platform }} wheel
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-15
            cargo_target_dir: target-release-macos-arm64
          - platform: macos-x86_64
            runner: macos-15-intel
            cargo_target_dir: target-release-macos-x86_64
          - platform: linux-x86_64
            runner: ubuntu-24.04
            cargo_target_dir: target-release-linux-x86_64
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            cargo_target_dir: target-release-linux-aarch64
          - platform: windows-x86_64
            runner: windows-2025
            cargo_target_dir: target-release-windows-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve checked-out source
        id: source
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Restore Cargo build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ matrix.cargo_target_dir }}
          key: cargo-target-v2-${{ matrix.platform }}-${{ steps.source.outputs.sha }}
          restore-keys: |
            cargo-target-v2-${{ matrix.platform }}-

      - name: Install release environment
        run: uv sync --frozen --no-default-groups --group release

      - name: Build wheel
        run: >-
          uv run python .codex/skills/build-release/scripts/release_build.py build-platform
          --platform "${{ matrix.platform }}"
          --version "${{ needs.validate.outputs.version }}"

      - name: Smoke built wheel
        run: >-
          uv run python .codex/skills/build-release/scripts/release_build.py smoke-wheel
          "wheelhouse-v${{ needs.validate.outputs.version }}-${{ matrix.platform }}"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-wheel-v${{ needs.validate.outputs.version }}-${{ matrix.platform }}
          path: wheelhouse-v${{ needs.validate.outputs.version }}-${{ matrix.platform }}/*.whl
          if-no-files-found: error

  final-check:
    name: Audit release distributions
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install release environment
        run: uv sync --frozen --no-default-groups --group release

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-wheel-v${{ needs.validate.outputs.version }}-*
          path: wheelhouse
          merge-multiple: true

      - name: Audit complete wheel set
        shell: bash
        run: >-
          uv run python .codex/skills/build-release/scripts/release_build.py final-check
          --version "${{ needs.validate.outputs.version }}"
          wheelhouse/*.whl

      - name: Build and audit source distribution
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp wheelhouse/*.whl dist/
          uv run maturin sdist --out dist
          uv run python .codex/skills/build-release/scripts/release_build.py audit-sdist \
            --version "${{ needs.validate.outputs.version }}" \
            dist/*.tar.gz
          uv run python scripts/check_sdist_internal_crates.py dist/*.tar.gz
          uv run twine check dist/*

      - name: Smoke stable ABI on Python 3.9
        shell: bash
        run: |
          set -euo pipefail
          uv python install 3.9
          uv run python .codex/skills/build-release/scripts/release_build.py smoke-wheel \
            wheelhouse/*manylinux*x86_64*.whl \
            --python "$(uv python find 3.9)"
          uv run python .codex/skills/build-release/scripts/release_build.py smoke-sdist \
            dist/*.tar.gz \
            --python "$(uv python find 3.9)"

      - name: Upload audited distribution bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-v${{ needs.validate.outputs.version }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - validate
      - final-check
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/supermariobrosnes-turbo
    permissions:
      id-token: write
    steps:
      - name: Download audited distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-v${{ needs.validate.outputs.version }}
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    name: Publish GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - validate
      - publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download audited distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-v${{ needs.validate.outputs.version }}
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          dist/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
          --title "${GITHUB_REF_NAME}"
